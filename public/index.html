<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAY MUSIC API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .logo { font-size: 3em; margin-bottom: 10px; }
        h1 { color: #1DB954; font-size: 2em; }
        .subtitle { color: #666; margin: 10px 0 20px 0; font-size: 14px; }
        .status {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
        }
        .online {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #1DB954;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .green { color: #1DB954; }
        .footer {
            margin-top: 20px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎵</div>
        <h1>JAY MUSIC API</h1>
        <p class="subtitle">Secure Music Proxy Service</p>
        <div class="status">
            <span class="online"></span>
            <span class="green">Online</span>
        </div>
        <div class="footer">Made with ❤️ by Jay</div>
    </div>
</body>
</html>
